apiVersion: v1
kind: Service
metadata:
  name: aos-whatsapp-bot
  namespace: aos
spec:
  selector:
    app: aos-whatsapp-bot
  ports:
    - name: http
      port: 3001
      targetPort: 3001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aos-whatsapp-bot
  namespace: aos
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aos-whatsapp-bot
  template:
    metadata:
      labels:
        app: aos-whatsapp-bot
    spec:
      containers:
        - name: bot
          image: ghcr.io/manashmba/aos-whatsapp-bot:latest
          ports:
            - containerPort: 3001
          env:
            - name: AOS_API_URL
              value: http://aos-backend:8000/api/v1
          envFrom:
            - secretRef:
                name: aos-secrets
          readinessProbe:
            httpGet: { path: /health, port: 3001 }
            initialDelaySeconds: 5
          resources:
            requests: { cpu: "50m", memory: "128Mi" }
            limits:   { cpu: "300m", memory: "384Mi" }
