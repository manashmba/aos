apiVersion: v1
kind: Service
metadata:
  name: aos-redis
  namespace: aos
spec:
  selector:
    app: aos-redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aos-redis
  namespace: aos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aos-redis
  template:
    metadata:
      labels:
        app: aos-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
