apiVersion: v1
kind: Secret
metadata:
  name: aos-secrets
  namespace: aos
type: Opaque
stringData:
  JWT_SECRET_KEY: "replace-with-long-random-string"
  ANTHROPIC_API_KEY: "sk-ant-..."
  OPENAI_API_KEY: "sk-..."
  AOS_SERVICE_TOKEN: "replace-with-shared-secret"
  WA_VERIFY_TOKEN: "replace"
  WA_PHONE_NUMBER_ID: ""
  WA_ACCESS_TOKEN: ""
  DATABASE_URL: "postgresql+asyncpg://aos_user:aos_password@aos-postgres:5432/aos_db"
  REDIS_URL: "redis://aos-redis:6379/0"
