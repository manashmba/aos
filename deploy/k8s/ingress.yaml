apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aos-ingress
  namespace: aos
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts: [app.aos.example.com, wa.aos.example.com]
      secretName: aos-tls
  rules:
    - host: app.aos.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: aos-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aos-frontend
                port:
                  number: 80
    - host: wa.aos.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aos-whatsapp-bot
                port:
                  number: 3001
