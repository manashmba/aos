apiVersion: v1
kind: Service
metadata:
  name: aos-frontend
  namespace: aos
spec:
  selector:
    app: aos-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aos-frontend
  namespace: aos
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aos-frontend
  template:
    metadata:
      labels:
        app: aos-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/manashmba/aos-frontend:latest
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 5
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits:   { cpu: "200m", memory: "256Mi" }
