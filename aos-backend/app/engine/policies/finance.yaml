# AOS Policy Pack — Finance
version: "1.0.0"

rules:
  - id: FIN-001
    name: Payment above 5L requires CFO approval
    domain: finance
    action: create_payment
    severity: critical
    when:
      - field: amount
        op: gte
        value: 500000
    then:
      require_approval: cfo
      max_wait_hours: 4

  - id: FIN-002
    name: Payment 50k–5L requires Finance Manager approval
    domain: finance
    action: create_payment
    when:
      - field: amount
        op: gte
        value: 50000
      - field: amount
        op: lt
        value: 500000
    then:
      require_approval: finance_manager
      max_wait_hours: 8

  - id: FIN-003
    name: Auto-approve payroll batch runs by Finance Manager
    domain: finance
    action: run_payroll
    when:
      - field: batch
        op: eq
        value: true
    then:
      require_approval: finance_manager

  - id: FIN-004
    name: Block journal posting in closed period
    domain: finance
    action: post_journal_entry
    severity: critical
    when:
      - field: period_closed
        op: eq
        value: true
    then:
      block: true
      reason: Fiscal period is closed. Entry cannot be posted.

  - id: FIN-005
    name: Unbalanced journal entry is always blocked
    domain: finance
    action: post_journal_entry
    severity: critical
    when:
      - field: is_balanced
        op: eq
        value: false
    then:
      block: true
      reason: Journal entry debits != credits.

  - id: FIN-006
    name: Foreign currency payment requires CFO
    domain: finance
    action: create_payment
    when:
      - field: currency
        op: ne
        value: INR
    then:
      require_approval: cfo

  - id: FIN-007
    name: Warn when payment drops cash below minimum balance
    domain: finance
    action: create_payment
    severity: critical
    when:
      - field: projected_balance
        op: lt
        value: 500000
    then:
      warn: Payment would drop cash balance below configured minimum (INR 5,00,000).
      require_approval: cfo

  - id: FIN-008
    name: GSTR mismatch blocks filing
    domain: finance
    action: file_gstr
    severity: critical
    when:
      - field: mismatch_amount
        op: gt
        value: 1.00
    then:
      block: true
      reason: GSTR-2B vs purchase register mismatch exceeds tolerance.
